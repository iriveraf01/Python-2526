<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Productos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="miestilo.css" />
  </head>

  <body class="bg-light">
    <header class="site-header py-4 mb-4 text-white text-center">
      <h1 class="h3 fw-bold mb-1">Gestión de Productos</h1>
      <p class="mb-0 small opacity-75">API REST con FastAPI</p>
    </header>

    <main class="container-xl pb-5">
      <div class="row g-4">
        <!-- ── Formulario de creación ── -->
        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h5 fw-semibold mb-4">Nuevo producto</h2>
              <form id="form-producto" novalidate>
                <div class="mb-3">
                  <label class="form-label fw-medium" for="nombre">
                    Nombre <span class="text-danger">*</span>
                  </label>
                  <input
                    class="form-control"
                    id="nombre"
                    name="nombre"
                    type="text"
                    placeholder="Ej: Teclado mecánico"
                    minlength="3"
                    maxlength="100"
                    required
                  />
                  <div class="form-text">Sin números · 3–100 caracteres</div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium" for="precio">
                    Precio (€) <span class="text-danger">*</span>
                  </label>
                  <input
                    class="form-control"
                    id="precio"
                    name="precio"
                    type="number"
                    placeholder="0.00"
                    step="0.01"
                    min="0.01"
                    required
                  />
                  <div class="form-text">Mayor que 0 · máx. 2 decimales</div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium" for="descripcion"
                    >Descripción</label
                  >
                  <textarea
                    class="form-control"
                    id="descripcion"
                    name="descripcion"
                    rows="3"
                    maxlength="500"
                    placeholder="Descripción opcional…"
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium" for="categorias"
                    >Categorías</label
                  >
                  <input
                    class="form-control"
                    id="categorias"
                    name="categorias"
                    type="text"
                    placeholder="Electrónica, Periféricos…"
                  />
                  <div class="form-text">Separadas por coma</div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-medium" for="stock">Stock</label>
                  <input
                    class="form-control"
                    id="stock"
                    name="stock"
                    type="number"
                    placeholder="0"
                    min="0"
                    value="0"
                  />
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Crear producto
                </button>
                <div
                  class="alert alert-danger mt-3 py-2 small mb-0"
                  id="form-error"
                  hidden
                ></div>
              </form>
            </div>
          </div>
        </div>

        <!-- ── Lista de productos ── -->
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <h2 class="h5 fw-semibold mb-0">
                  Productos
                  <span class="badge bg-primary ms-1" id="badge-count">0</span>
                </h2>
                <button
                  class="btn btn-sm btn-outline-secondary"
                  id="btn-recargar"
                >
                  ↻ Actualizar
                </button>
              </div>

              <div
                class="row row-cols-1 row-cols-sm-2 row-cols-xl-3 g-3"
                id="productos-grid"
              >
                <div id="empty-state" class="text-center text-muted py-5 w-100">
                  Aún no hay productos. ¡Crea el primero!
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ── Modal de detalle ── -->
    <div class="modal fade" id="modal-detalle" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-title"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body" id="modal-body"></div>
        </div>
      </div>
    </div>

    <!-- ── Template: tarjeta de producto ── -->
    <template id="tpl-producto-card">
      <div class="col">
        <article class="card h-100 producto-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <span class="text-muted small"
                >#<span data-field="id"></span
              ></span>
              <span class="badge" data-field="stock-badge"></span>
            </div>
            <h3
              class="card-title h6 fw-semibold card-nombre"
              data-field="nombre"
            ></h3>
            <p class="fw-bold text-primary mb-1" data-field="precio"></p>
            <p
              class="card-text small text-muted card-descripcion"
              data-field="descripcion"
            ></p>
          </div>
          <div
            class="card-footer bg-transparent border-top-0 d-flex justify-content-between align-items-end pt-0"
          >
            <div class="d-flex flex-wrap gap-1" data-field="categorias"></div>
            <time class="text-muted card-fecha" data-field="fecha"></time>
          </div>
        </article>
      </div>
    </template>

    <!-- ── Template: detalle en modal ── -->
    <template id="tpl-detalle">
      <dl class="row g-2 mb-0">
        <dt class="col-4 fw-medium text-muted">ID</dt>
        <dd class="col-8" data-field="id"></dd>
        <dt class="col-4 fw-medium text-muted">Precio</dt>
        <dd class="col-8 fw-bold text-primary" data-field="precio"></dd>
        <dt class="col-4 fw-medium text-muted">Stock</dt>
        <dd class="col-8" data-field="stock"></dd>
        <dt class="col-4 fw-medium text-muted">Descripción</dt>
        <dd class="col-8" data-field="descripcion"></dd>
        <dt class="col-4 fw-medium text-muted">Categorías</dt>
        <dd class="col-8" data-field="categorias"></dd>
        <dt class="col-4 fw-medium text-muted">Creado</dt>
        <dd class="col-8" data-field="fecha"></dd>
      </dl>
    </template>

    <!-- ── Template: toast ── -->
    <template id="tpl-toast">
      <div
        class="toast align-items-center border-0 text-white"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body fw-medium" data-field="msg"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Cerrar"
          ></button>
        </div>
      </div>
    </template>

    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      id="toast-container"
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="miscript.js"></script>
  </body>
</html>
